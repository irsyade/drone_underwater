<!DOCTYPE html>
<html lang="id" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONO</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 20%, rgba(6,182,212,0.05), transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(168,85,247,0.05), transparent 40%),
                        #09090b;
        }

        .grid-bg {
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6,182,212,0.15);
        }

        .card-clean {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(6,182,212,0.15);
            transition: all .3s ease;
        }

        .card-clean:hover {
            transform: translateY(-4px);
            border-color: rgba(6,182,212,0.35);
        }

        .tab-active {
            background: rgba(6,182,212,0.15);
            border: 1px solid rgba(6,182,212,0.3);
        }
    </style>
</head>

<body class="text-slate-100 min-h-screen">

<div class="fixed inset-0 grid-bg opacity-30 pointer-events-none"></div>

<!-- HEADER -->
<header class="glass sticky top-0 z-50 shadow-[0_0_40px_rgba(6,182,212,0.08)]">
    <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">

        <div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                CHRONO
            </h1>
            <p class="text-xs text-cyan-400/60 tracking-widest uppercase">
                Water Observatory System
            </p>
        </div>

        <div class="flex items-center gap-10">

            <div class="text-right">
                <div class="text-xs text-cyan-400/60 font-mono">SYSTEM TIME</div>
                <div class="text-xl font-mono text-cyan-300" id="clock">00:00:00</div>
            </div>

            <div class="text-right">
                <div class="text-xs text-cyan-400/60 font-mono">SYNC</div>
                <div id="syncStatus" class="text-emerald-400 font-mono text-sm">00:00:00</div>
            </div>

        </div>
    </div>
</header>

<!-- NAVIGATION -->
<nav class="max-w-7xl mx-auto px-8 mt-10">
    <div class="flex gap-3">
        <button onclick="switchTab('monitoring')" id="tab-monitoring"
            class="px-6 py-3 rounded-xl border border-cyan-500/20 text-sm tracking-widest font-bold transition hover:bg-cyan-500/10">
            Monitoring
        </button>

        <button onclick="switchTab('reports')" id="tab-reports"
            class="px-6 py-3 rounded-xl border border-cyan-500/20 text-sm tracking-widest font-bold transition hover:bg-cyan-500/10">
            Reports
        </button>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-8 py-16 space-y-16">

<!-- ================= MONITORING ================= -->

<section id="section-monitoring" class="space-y-12">

    <div class="flex justify-between items-center">
        <h2 class="text-4xl font-extrabold tracking-tight">
            <span class="bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                Real-Time Monitoring
            </span>
        </h2>

        <button onclick="refreshSystem()" id="refreshBtn"
            class="px-6 py-3 rounded-xl bg-gradient-to-r from-cyan-600 to-purple-600 font-bold tracking-widest text-sm transition-transform hover:scale-105 active:scale-95">
            Refresh System
        </button>
    </div>

    <!-- SENSOR CARDS -->
    <div class="grid md:grid-cols-3 gap-8">

        <!-- PH -->
        <div class="card-clean p-8 rounded-2xl">
            <div class="text-sm text-cyan-400/60 font-mono mb-4">SENSOR-01</div>
            <div class="text-slate-400 text-sm mb-6">PH LEVEL</div>
            <div class="flex items-end gap-2">
                <span id="val-ph" class="text-6xl font-extrabold tracking-tight text-cyan-400">0.0</span>
                <span class="text-slate-500 font-mono">pH</span>
            </div>
            <div class="mt-6 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div id="ph-bar" class="h-full bg-gradient-to-r from-cyan-500 to-purple-500 w-0"></div>
            </div>
        </div>

        <!-- TURBIDITY -->
        <div class="card-clean p-8 rounded-2xl">
            <div class="text-sm text-blue-400/60 font-mono mb-4">SENSOR-02</div>
            <div class="text-slate-400 text-sm mb-6">TURBIDITY</div>
            <div class="flex items-end gap-2">
                <span id="val-water" class="text-6xl font-extrabold tracking-tight text-blue-400">0</span>
                <span class="text-slate-500 font-mono">NTU</span>
            </div>
            <div class="mt-6 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div id="turbidity-bar" class="h-full bg-gradient-to-r from-blue-500 to-cyan-500 w-0"></div>
            </div>
        </div>

        <!-- BATTERY -->
        <div class="card-clean p-8 rounded-2xl">
            <div class="text-sm text-purple-400/60 font-mono mb-4">SENSOR-03</div>
            <div class="text-slate-400 text-sm mb-6">BATTERY</div>
            <div class="flex items-end gap-2">
                <span id="val-battery" class="text-6xl font-extrabold tracking-tight text-purple-400">0</span>
                <span class="text-slate-500 font-mono">%</span>
            </div>
            <div class="mt-6 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div id="battery-bar" class="h-full bg-gradient-to-r from-purple-500 to-pink-500 w-0"></div>
            </div>
        </div>

    </div>

    <!-- CHART -->
    <div class="p-10 rounded-2xl bg-slate-900/80 border border-cyan-500/20 shadow-2xl">
        <h3 class="text-lg font-bold mb-6 text-cyan-400">Historical Trend</h3>
        <div class="h-[400px]">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

</section>

<!-- ================= REPORTS ================= -->

<section id="section-reports" class="hidden space-y-12">

    <h2 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
        Data Reports
    </h2>

    <div class="grid lg:grid-cols-3 gap-8">

        <!-- SUMMARY -->
        <div class="card-clean p-8 rounded-2xl space-y-6">

            <select onchange="fetchReports(this.value)"
                class="bg-slate-800 border border-cyan-500/20 rounded-xl px-4 py-3 text-xs font-mono text-cyan-400 outline-none">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>

            <div class="space-y-4">
                <div class="flex justify-between">
                    <span class="text-slate-400 text-sm">Avg PH</span>
                    <span id="rep-avg-ph" class="text-cyan-400 font-bold">0.00</span>
                </div>

                <div class="flex justify-between">
                    <span class="text-slate-400 text-sm">Max Turbidity</span>
                    <span id="rep-max-turb" class="text-blue-400 font-bold">0 NTU</span>
                </div>

                <div class="flex justify-between">
                    <span class="text-slate-400 text-sm">Total Logs</span>
                    <span id="rep-total-logs" class="text-purple-400 font-bold">0</span>
                </div>
            </div>

            <button onclick="exportToPDF()" id="pdfBtn"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-600 to-purple-600 font-bold tracking-widest text-sm transition-transform hover:scale-105 active:scale-95">
                Export Report
            </button>

            <div class="h-[200px] mt-6">
                <canvas id="reportChart"></canvas>
            </div>

        </div>

        <!-- TABLE -->
        <div class="lg:col-span-2 card-clean rounded-2xl overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-slate-800/60 text-cyan-400/70">
                    <tr>
                        <th class="px-6 py-4 text-left">Timestamp</th>
                        <th class="px-6 py-4 text-left">PH</th>
                        <th class="px-6 py-4 text-left">Turbidity</th>
                        <th class="px-6 py-4 text-left">Battery</th>
                    </tr>
                </thead>
                <tbody id="report-table-body" class="divide-y divide-cyan-500/10">
                    <tr>
                        <td colspan="4" class="px-6 py-10 text-center text-slate-500">
                            Loading Data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</section>

</main>

 <script>
        // [SAME JavaScript CODE - TIDAK DIUBAH]
        // Init Lucide Icons
        lucide.createIcons();

        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') document.documentElement.classList.remove('dark');

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateChartTheme();
        });

        // Clock Management
        let startTime = Date.now();
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('clock').textContent = time;

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const hrs = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const mins = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            document.getElementById('syncStatus').textContent = `${hrs}:${mins}:${secs}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Tab Management
        function switchTab(tab) {
            const monSection = document.getElementById('section-monitoring');
            const repSection = document.getElementById('section-reports');
            const monTab = document.getElementById('tab-monitoring');
            const repTab = document.getElementById('tab-reports');

            if (tab === 'monitoring') {
                monSection.classList.remove('hidden');
                repSection.classList.add('hidden');
                monTab.classList.add('tab-active-monitoring');
                monTab.classList.remove('tab-active-reports');
                repTab.classList.remove('tab-active-monitoring', 'tab-active-reports');
            } else {
                monSection.classList.add('hidden');
                repSection.classList.remove('hidden');
                repTab.classList.add('tab-active-reports');
                repTab.classList.remove('tab-active-monitoring');
                monTab.classList.remove('tab-active-monitoring', 'tab-active-reports');
            }
        }

        // Chart.js Implementation
        const ctx = document.getElementById('trendChart').getContext('2d');
        let trendChart;

        function initChart() {
            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
            const textColor = isDark ? '#71717a' : '#71717a';

            const data = {
                labels: Array.from({ length: 20 }, (_, i) => ''),
                datasets: [
                    {
                        label: 'pH',
                        data: Array(20).fill(null),
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6,182,212,0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0,
                    },
                    {
                        label: 'Turbidity (NTU)',
                        data: Array(20).fill(null),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0,
                        yAxisID: 'y1'
                    },
                    {
                        label: 'Battery (%)',
                        data: Array(20).fill(null),
                        borderColor: '#a855f7',
                        backgroundColor: 'rgba(168,85,247,0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0,
                    }
                ]
            };

            trendChart = new Chart(ctx, {
                type: 'line',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: textColor, font: { size: 10 } }
                        },
                        y: {
                            grid: { color: gridColor },
                            ticks: { color: textColor, font: { size: 10 } }
                        },
                        y1: {
                            position: 'right',
                            display: false
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: isDark ? '#18181b' : '#fff',
                            titleColor: isDark ? '#fff' : '#000',
                            bodyColor: isDark ? '#ccc' : '#444',
                            borderWidth: 1,
                            borderColor: 'rgba(255,255,255,0.1)',
                            padding: 12,
                            boxPadding: 6
                        }
                    }
                }
            });
        }

        function updateChartTheme() {
            if (trendChart) {
                trendChart.destroy();
                initChart();
            }
        }

        // Fetch Real Data from API
        let lastDataId = null;

        async function fetchData() {
            try {
                const response = await fetch('api.php?get_latest=true');
                const data = await response.json();

                if (data.status !== "empty" && data.id) {
                    if (data.id !== lastDataId) {
                        lastDataId = data.id;

                        document.getElementById('val-ph').textContent = parseFloat(data.kualitas_air).toFixed(1);
                        document.getElementById('val-water').textContent = Math.floor(data.tahan);
                        document.getElementById('val-battery').textContent = Math.floor(data.daya_listrik);

                        if (trendChart) {
                            trendChart.data.datasets[0].data.shift();
                            trendChart.data.datasets[0].data.push(parseFloat(data.kualitas_air));
                            trendChart.data.datasets[1].data.shift();
                            trendChart.data.datasets[1].data.push(parseFloat(data.tahan));
                            trendChart.data.datasets[2].data.shift();
                            trendChart.data.datasets[2].data.push(parseFloat(data.daya_listrik));
                            trendChart.update('none');
                        }

                        startTime = Date.now();
                        document.getElementById('syncStatus').className = "text-sm font-mono font-medium text-emerald-500 uppercase";
                    }
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('syncStatus').textContent = "OFFLINE";
                document.getElementById('syncStatus').className = "text-sm font-mono font-medium text-amber-500 uppercase";
            }
        }

        // Report Chart Management
        let reportChart;
        function initReportChart(avgPh = 0, maxTurb = 0) {
            const ctxReport = document.getElementById('reportChart').getContext('2d');
            if (reportChart) reportChart.destroy();

            const isDark = document.documentElement.classList.contains('dark');

            reportChart = new Chart(ctxReport, {
                type: 'bar',
                data: {
                    labels: ['Avg pH', 'Max NTU (Scaled)'],
                    datasets: [{
                        data: [avgPh, maxTurb / 10],
                        backgroundColor: ['#06b6d4', '#3b82f6'],
                        borderRadius: 8,
                        barThickness: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 14,
                            grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' },
                            ticks: { display: false }
                        },
                        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#71717a' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        async function fetchReports(period = 'daily') {
            try {
                const response = await fetch(`api.php?get_reports=true&period=${period}`);
                const result = await response.json();

                if (result.status === "success") {
                    const s = result.summary;
                    const ph = s.avg_kualitas_air ? parseFloat(s.avg_kualitas_air) : 0;
                    const turb = s.max_tahan ? parseFloat(s.max_tahan) : 0;

                    document.getElementById('rep-avg-ph').textContent = ph.toFixed(2);
                    document.getElementById('rep-max-turb').textContent = Math.floor(turb) + " NTU";
                    document.getElementById('rep-total-logs').textContent = s.total_logs || "0";

                    initReportChart(ph, turb);

                    const tbody = document.getElementById('report-table-body');
                    const history = result.history || [];

                    if (history.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-xs text-zinc-400">Tidak ada data untuk periode ini.</td></tr>`;
                    } else {
                        tbody.innerHTML = history.map(row => {
                            const ts = row.timestamp || '-';
                            const ph_val = parseFloat(row.kualitas_air).toFixed(1);
                            const ntu_val = Math.floor(row.tahan);
                            const bat_val = Math.floor(row.daya_listrik);

                            const batColor = bat_val >= 60 ? 'text-emerald-500' : bat_val >= 30 ? 'text-amber-500' : 'text-red-500';

                            return `
                                <tr class="hover:bg-zinc-50 dark:hover:bg-zinc-800/30 transition-colors">
                                    <td class="px-6 py-4 text-xs font-mono text-zinc-400">${ts}</td>
                                    <td class="px-6 py-4 text-xs font-bold">${ph_val}</td>
                                    <td class="px-6 py-4 text-xs font-bold">${ntu_val} NTU</td>
                                    <td class="px-6 py-4 text-xs font-bold ${batColor}">${bat_val}%</td>
                                </tr>
                            `;
                        }).join('');
                    }
                } else {
                    document.getElementById('report-table-body').innerHTML =
                        `<tr><td colspan="4" class="px-6 py-10 text-center text-xs text-red-400">Gagal memuat data: ${result.message || 'Unknown error'}</td></tr>`;
                }
            } catch (error) {
                console.error('Error fetching reports:', error);
                document.getElementById('report-table-body').innerHTML =
                    `<tr><td colspan="4" class="px-6 py-10 text-center text-xs text-red-400">Koneksi ke server gagal.</td></tr>`;
            }
        }

        async function refreshSystem() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            btn.disabled = true;
            icon.setAttribute('data-lucide', 'loader-2');
            icon.classList.add('animate-spin');
            lucide.createIcons();

            await fetchData();
            await fetchReports(document.querySelector('select')?.value || 'daily');

            btn.disabled = false;
            icon.setAttribute('data-lucide', 'refresh-cw');
            icon.classList.remove('animate-spin');
            lucide.createIcons();
        }

        function exportToPDF() {
            const btn = document.getElementById('pdfBtn');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Generating...';
            lucide.createIcons();

            const element = document.getElementById('section-reports');
            const opt = {
                margin: 10,
                filename: 'SE-PHON32-Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: document.documentElement.classList.contains('dark') ? '#09090b' : '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }).catch(err => {
                console.error('PDF Error:', err);
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            });
        }

        // Initialize
        initChart();
        setInterval(fetchData, 3000);
        setInterval(() => fetchReports(document.querySelector('select')?.value || 'daily'), 30000);
        fetchData();
        fetchReports();

        // Tab initialization
        document.getElementById('tab-monitoring').classList.add('tab-active-monitoring');
    </script>

</body>
</html>
